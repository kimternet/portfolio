<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predict Health Status</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>Predict Health Status</h1>
        <p>Enter the values below to predict the health status as Normal or Abnormal.</p>
        <form id="predict-form">
            <div class="input-group">
                <label for="hr">Heart Rate (HR):</label>
                <input type="number" id="hr" name="hr" step="any" required>
            </div>
            <div class="input-group">
                <label for="resp">Respiration Rate (RESP):</label>
                <input type="number" id="resp" name="resp" step="any" required>
            </div>
            <div class="input-group">
                <label for="spo2">Oxygen Saturation (SpO2):</label>
                <input type="number" id="spo2" name="spo2" step="any" required>
            </div>
            <div class="input-group">
                <label for="temp">Temperature (TEMP):</label>
                <input type="number" id="temp" name="temp" step="any" required>
            </div>
            <button type="submit">Predict</button>
        </form>
        <div id="result" class="result"></div>
    </div>

    <footer>
        <p>&copy; 2024 Your Name. All rights reserved.</p>
    </footer>

    <script src="{{ url_for('static', filename='js/scripts.js') }}"></script>
</body>
</html>
